<!DOCTYPE html>
<html lang="uk">
<head>
    <title>Список користувачів</title>
</head>
<body>
    <h1>Список користувачів</h1>
    <ul>
        {% for user in users %}
            <li>{{ user.first_name }} - {{ user.email }} <a href="/auth/users/{{ user.id }}/">Детальніше</a></li>
        {% endfor %}
    </ul>
    <a href="/auth/logout/">Вийти</a>
</body>
</html>
